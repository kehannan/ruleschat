{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper">
    <div id="chat-container" class="chat-messages">
        <!-- Chat messages will be displayed here -->
        <div class="welcome-message">
            <div class="message-content">
                <p>How can I help you with Advanced Squad Leader rules today?</p>
            </div>
        </div>
    </div>
    
    <div class="chat-input-container">
        <div class="chat-input-wrapper">
            <textarea id="chat-message-input" class="chat-input" placeholder="Message Rules Chat..." rows="1"></textarea>
            <button id="chat-message-submit" class="send-button" type="button" title="Send message">Send</button>
        </div>
        <div id="connection-status" class="connection-status">Connected</div>
    </div>
</div>

<!-- Feedback template (hidden, cloned for each answer) -->
<template id="feedback-template">
  <div class="feedback-section">
    <span>Was this answer helpful?</span>
    <button class="thumbs-up" title="Thumbs up">👍</button>
    <button class="thumbs-down" title="Thumbs down">👎</button>
    <button class="show-better-answer" title="Suggest a better answer">💬</button>
    <form class="better-answer-form">
      <textarea class="better-answer" rows="1" placeholder="Suggest a better answer"></textarea>
      <button class="submit-better-answer" type="submit">Submit</button>
    </form>
    <span class="feedback-thankyou" style="display:none;">Thank you for your feedback!</span>
  </div>
</template>
{% endblock %}

{% block extra_css %}
<style>
  /* ChatGPT-like styling */
  body:has(.chat-wrapper) #main-container {
    max-width: 100%;
    padding: 0;
    margin: 0;
    height: calc(100vh - 80px);
    display: flex;
    flex-direction: column;
  }

  .chat-wrapper {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 768px;
    margin: 0 auto;
    width: 100%;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 0;
    background: #ffffff;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar {
    width: 8px;
  }

  .chat-messages::-webkit-scrollbar-track {
    background: transparent;
  }

  .chat-messages::-webkit-scrollbar-thumb {
    background: #d1d5db;
    border-radius: 4px;
  }

  .chat-messages::-webkit-scrollbar-thumb:hover {
    background: #9ca3af;
  }

  .welcome-message,
  .user-message,
  .bot-message {
    padding: 1.5rem 1rem;
    animation: fadeIn 0.3s ease-in;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .user-message {
    background: #f7f7f8;
  }

  .bot-message {
    background: #ffffff;
  }


  .message-content {
    flex: 1;
    min-width: 0;
    line-height: 1.75;
    color: #353740;
    font-size: 16px;
  }

  .message-content p {
    margin: 0 0 0.75rem 0;
  }

  .message-content p:last-child {
    margin-bottom: 0;
  }

  .message-content code {
    background: #f1f1f1;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
  }

  .message-content pre {
    background: #f1f1f1;
    padding: 1rem;
    border-radius: 8px;
    overflow-x: auto;
    margin: 0.75rem 0;
  }

  .message-content pre code {
    background: none;
    padding: 0;
  }

  .chat-input-container {
    border-top: 1px solid #e5e5e5;
    background: #ffffff;
    padding: 1rem;
  }

  .chat-input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 0.5rem;
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 24px;
    padding: 0.75rem 1rem;
    transition: border-color 0.2s;
  }

  .chat-input-wrapper:focus-within {
    border-color: #10a37f;
    box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
  }

  .chat-input {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-size: 16px;
    line-height: 1.5;
    color: #353740;
    background: transparent;
    max-height: 200px;
    overflow-y: auto;
    font-family: inherit;
  }

  .chat-input::placeholder {
    color: #8e8ea0;
  }

  .send-button {
    background: #10a37f;
    border: none;
    color: white;
    cursor: pointer;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 14px;
    font-weight: 500;
  }

  .send-button:hover:not(:disabled) {
    background: #0d8f6e;
  }

  .send-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .connection-status {
    text-align: center;
    font-size: 12px;
    color: #8e8ea0;
    margin-top: 0.5rem;
    padding: 0.25rem 0;
  }

  .connection-status.connected {
    color: #10a37f;
  }

  .connection-status.disconnected {
    color: #ef4444;
  }

  /* Feedback section styling */
  .feedback-section {
    padding: 0.75rem 1rem;
    margin-top: 0.5rem;
    border-top: 1px solid #e5e5e5;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    font-size: 14px;
  }

  .feedback-section button {
    background: transparent;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 0.375rem 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }

  .feedback-section button:hover:not(:disabled) {
    background: #f7f7f8;
    border-color: #9ca3af;
  }

  .feedback-section button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .better-answer-form {
    display: none;
    flex: 1;
    gap: 0.5rem;
    margin-left: 0.5rem;
  }

  .better-answer-form.active {
    display: flex;
  }

  .better-answer {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 0.5rem;
    font-size: 14px;
    resize: none;
  }

  .feedback-thankyou {
    color: #10a37f;
    font-size: 14px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 0.5rem;
    padding: 0.5rem 0;
  }

  .typing-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #9ca3af;
    animation: typing 1.4s infinite;
  }

  .typing-dot:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing-dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes typing {
    0%, 60%, 100% {
      transform: translateY(0);
      opacity: 0.7;
    }
    30% {
      transform: translateY(-10px);
      opacity: 1;
    }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .chat-wrapper {
      height: calc(100vh - 150px);
      border-radius: 0;
    }

    .user-message,
    .bot-message {
      padding: 1rem 0.75rem;
    }

  }
</style>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + window.location.host + '/ws/chat/';
    let chatSocket = null;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    const reconnectInterval = 3000;
    let lastUserQuestion = '';
    let lastAssistantAnswer = '';
    let streamingTimeout = null;
    let chunkBuffer = [];
    let isDisplaying = false;
    let displayInterval = null;

    function createBotMessage() {
        const chatContainer = document.querySelector('#chat-container');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('bot-message', 'current');
        
        const content = document.createElement('div');
        content.classList.add('message-content');
        
        messageDiv.appendChild(content);
        chatContainer.appendChild(messageDiv);
        
        return content;
    }

    function displayBufferedChunks() {
        if (isDisplaying || chunkBuffer.length === 0) return;
        isDisplaying = true;
        
        const chatContainer = document.querySelector('#chat-container');
        let currentBotMessageContent = chatContainer.querySelector('.bot-message.current .message-content');
        if (!currentBotMessageContent) {
            currentBotMessageContent = createBotMessage();
        }
        
        displayInterval = setInterval(() => {
            if (chunkBuffer.length === 0) {
                clearInterval(displayInterval);
                isDisplaying = false;
                // Parse markdown after all chunks displayed
                const finalContent = currentBotMessageContent.getAttribute('data-content') || '';
                currentBotMessageContent.innerHTML = marked.parse(finalContent);
                lastAssistantAnswer = finalContent;
                
                const currentBotMessage = currentBotMessageContent.closest('.bot-message');
                currentBotMessage.classList.remove('current');
                
                if (!currentBotMessage.nextElementSibling || !currentBotMessage.nextElementSibling.classList.contains('feedback-section')) {
                    addFeedbackUI(currentBotMessage, lastUserQuestion, lastAssistantAnswer);
                }
                return;
            }
            
            const chunk = chunkBuffer.shift();
            const currentContent = currentBotMessageContent.getAttribute('data-content') || '';
            const newContent = currentContent + chunk;
            currentBotMessageContent.setAttribute('data-content', newContent);
            currentBotMessageContent.textContent = newContent;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 20); // Display chunks every 20ms for smooth streaming effect
    }

    function setupWebSocket() {
        chatSocket = new WebSocket(wsUrl);
        chatSocket.onopen = function() {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Connected';
            statusEl.classList.remove('disconnected');
            statusEl.classList.add('connected');
            reconnectAttempts = 0;
        };
        chatSocket.onclose = function(e) {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Disconnected - attempting to reconnect...';
            statusEl.classList.remove('connected');
            statusEl.classList.add('disconnected');
            if (reconnectAttempts < maxReconnectAttempts) {
                reconnectAttempts++;
                setTimeout(setupWebSocket, reconnectInterval);
            } else {
                statusEl.textContent = 'Connection lost. Please reload the page to reconnect.';
            }
        };
        chatSocket.onerror = function(err) {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Connection error';
            statusEl.classList.remove('connected');
            statusEl.classList.add('disconnected');
        };
        chatSocket.onmessage = function(e) {
            if (e.data === "__ping__") {
                chatSocket.send("__pong__");
                return;
            }
            console.log('📥 Buffering chunk:', e.data.substring(0, 50) + (e.data.length > 50 ? '...' : ''));
            
            // Add chunk to buffer
            chunkBuffer.push(e.data);
            
            // Start displaying if not already running
            if (!isDisplaying) {
                displayBufferedChunks();
            }
        };
    }
    function createUserMessage(text) {
        const chatContainer = document.querySelector('#chat-container');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('user-message');
        
        const content = document.createElement('div');
        content.classList.add('message-content');
        content.textContent = text;
        
        messageDiv.appendChild(content);
        chatContainer.appendChild(messageDiv);
        
        return messageDiv;
    }

    function sendMessage() {
        if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) {
            alert("Connection lost. Please reload the page to reconnect.");
            return;
        }
        const messageInput = document.querySelector('#chat-message-input');
        const message = messageInput.value.trim();
        if (!message) return;
        
        // Remove welcome message if it exists
        const welcomeMessage = document.querySelector('.welcome-message');
        if (welcomeMessage) {
            welcomeMessage.remove();
        }
        
        // Clear buffer and stop any ongoing display
        chunkBuffer = [];
        if (displayInterval) {
            clearInterval(displayInterval);
            displayInterval = null;
        }
        isDisplaying = false;
        
        const currentBotMessage = document.querySelector('.bot-message.current');
        if (currentBotMessage) {
            currentBotMessage.classList.remove('current');
        }
        
        chatSocket.send(message);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        
        const chatContainer = document.querySelector('#chat-container');
        createUserMessage(message);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        lastUserQuestion = message;
    }
    function addFeedbackUI(botMessageElem, question, answer) {
        if (botMessageElem.nextElementSibling && botMessageElem.nextElementSibling.classList.contains('feedback-section')) {
            botMessageElem.nextElementSibling.remove();
        }
        const template = document.getElementById('feedback-template');
        const feedbackElem = template.content.cloneNode(true);
        const section = feedbackElem.querySelector('.feedback-section');
        const upBtn = section.querySelector('.thumbs-up');
        const downBtn = section.querySelector('.thumbs-down');
        const showBetterBtn = section.querySelector('.show-better-answer');
        const betterForm = section.querySelector('.better-answer-form');
        const betterTextarea = section.querySelector('.better-answer');
        const submitBetterBtn = section.querySelector('.submit-better-answer');
        const thankYou = section.querySelector('.feedback-thankyou');

        upBtn.onclick = function() {
            upBtn.disabled = true;
            downBtn.disabled = true;
            showBetterBtn.disabled = true;
            fetch('/api/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    question: question,
                    answer: answer,
                    thumbs_up: true,
                    comment: ''
                })
            }).then(r => r.json()).then(data => {
                thankYou.style.display = '';
                setTimeout(() => {
                    section.style.display = 'none';
                }, 2000);
            });
        };
        downBtn.onclick = function() {
            upBtn.disabled = true;
            downBtn.disabled = true;
            showBetterBtn.disabled = true;
            fetch('/api/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    question: question,
                    answer: answer,
                    thumbs_up: false,
                    comment: ''
                })
            }).then(r => r.json()).then(data => {
                thankYou.style.display = '';
                setTimeout(() => {
                    section.style.display = 'none';
                }, 2000);
            });
        };
        showBetterBtn.onclick = function() {
            betterForm.classList.add('active');
            showBetterBtn.style.display = 'none';
        };
        betterForm.onsubmit = function(e) {
            e.preventDefault();
            if (!betterTextarea.value.trim()) {
                betterTextarea.focus();
                return;
            }
            upBtn.disabled = true;
            downBtn.disabled = true;
            showBetterBtn.disabled = true;
            submitBetterBtn.disabled = true;
            betterTextarea.disabled = true;
            fetch('/api/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    question: question,
                    answer: answer,
                    thumbs_up: null,
                    comment: betterTextarea.value.trim()
                })
            }).then(r => r.json()).then(data => {
                thankYou.style.display = '';
                setTimeout(() => {
                    section.style.display = 'none';
                }, 2000);
            });
        };
        botMessageElem.parentNode.insertBefore(section, botMessageElem.nextSibling);
    }
    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    }

    document.addEventListener('DOMContentLoaded', function() {
        const inputField = document.querySelector('#chat-message-input');
        if (inputField) {
            // Auto-resize textarea
            inputField.addEventListener('input', function() {
                autoResizeTextarea(this);
            });
            
            inputField.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                    return false;
                }
            });
        }
        const submitButton = document.querySelector('#chat-message-submit');
        if (submitButton) {
            submitButton.onclick = sendMessage;
        }
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible' && 
                (!chatSocket || chatSocket.readyState !== WebSocket.OPEN)) {
                setupWebSocket();
            }
        });
        setupWebSocket();
    });
</script>
{% endblock %}
