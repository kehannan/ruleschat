{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper">
    <div id="chat-container" class="chat-messages">
        <!-- Chat messages will be displayed here -->
        <div class="welcome-message">
            <div class="message-content">
                <p>How can I help you with Advanced Squad Leader rules today?</p>
            </div>
        </div>
    </div>

    <div class="chat-input-container">
        <div class="chat-input-wrapper">
            <textarea id="chat-message-input" class="chat-input" placeholder="Message Rules Chat..."
                rows="1"></textarea>
            <button id="chat-message-submit" class="send-button" type="button" title="Send message">Send</button>
        </div>
        <div id="connection-status" class="connection-status">Connected</div>
        <div id="latency-display" class="latency-display" style="display: none;"></div>
    </div>
</div>

<!-- Feedback template (hidden, cloned for each answer) -->
<template id="feedback-template">
    <div class="feedback-section">
        <button class="thumbs-up" title="Thumbs up">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" />
            </svg>
        </button>
        <button class="thumbs-down" title="Thumbs down">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17" />
            </svg>
        </button>
        <span class="feedback-thankyou" style="display:none;">Thank you for your feedback!</span>
    </div>
</template>

<!-- PDF Viewer Modal -->
<div id="pdf-modal" class="pdf-modal" style="display: none;">
    <div class="pdf-modal-backdrop" onclick="closePdfModal()"></div>
    <div class="pdf-modal-content">
        <div class="pdf-modal-header">
            <h3>ASL Rulebook</h3>
            <button class="pdf-modal-close" onclick="closePdfModal()" title="Close">×</button>
        </div>
        <div class="pdf-modal-body">
            <div id="pdf-controls" class="pdf-controls">
                <button id="pdf-prev" onclick="pdfPrevPage()" disabled>Previous</button>
                <span id="pdf-page-info">Page 1 of 1</span>
                <button id="pdf-next" onclick="pdfNextPage()" disabled>Next</button>
                <button id="pdf-zoom-out" onclick="pdfZoomOut()">-</button>
                <span id="pdf-zoom-level">100%</span>
                <button id="pdf-zoom-in" onclick="pdfZoomIn()">+</button>
            </div>
            <div id="pdf-container" class="pdf-container">
                <canvas id="pdf-canvas"></canvas>
            </div>
            <div id="pdf-loading" class="pdf-loading">Loading PDF...</div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/chat.css') }}">
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    // Configure PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + window.location.host + '/ws/chat/';
    let chatSocket = null;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    const reconnectInterval = 3000;
    let lastUserQuestion = '';
    let lastAssistantAnswer = '';
    let streamingTimeout = null;
    let chunkBuffer = [];
    let isDisplaying = false;
    let displayInterval = null;

    function createBotMessage() {
        // Remove searching bubble if it exists
        const searchingBubble = document.querySelector('.searching-bubble');
        if (searchingBubble) {
            searchingBubble.remove();
        }

        const chatContainer = document.querySelector('#chat-container');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('bot-message', 'current');

        const content = document.createElement('div');
        content.classList.add('message-content');

        messageDiv.appendChild(content);
        chatContainer.appendChild(messageDiv);

        return content;
    }

    function createSearchingBubble() {
        const chatContainer = document.querySelector('#chat-container');
        if (!chatContainer) {
            return;
        }
        const searchingDiv = document.createElement('div');
        searchingDiv.className = 'searching-bubble';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.innerHTML = 'Searching <span class="searching-dots"><span></span><span></span><span></span></span>';
        searchingDiv.appendChild(contentDiv);
        chatContainer.appendChild(searchingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function displayBufferedChunks() {
        if (isDisplaying || chunkBuffer.length === 0) return;
        isDisplaying = true;

        const chatContainer = document.querySelector('#chat-container');
        let currentBotMessageContent = chatContainer.querySelector('.bot-message.current .message-content');
        if (!currentBotMessageContent) {
            currentBotMessageContent = createBotMessage();
        }

        displayInterval = setInterval(() => {
            if (chunkBuffer.length === 0) {
                clearInterval(displayInterval);
                isDisplaying = false;
                // Parse markdown after all chunks displayed
                const finalContent = currentBotMessageContent.getAttribute('data-content') || '';
                let htmlContent = marked.parse(finalContent);
                
                currentBotMessageContent.innerHTML = htmlContent;
                
                // Make section references clickable
                // makeSectionReferencesClickable(currentBotMessageContent); // Disabled - will add back later
                lastAssistantAnswer = finalContent;

                const currentBotMessage = currentBotMessageContent.closest('.bot-message');
                currentBotMessage.classList.remove('current');

                if (!currentBotMessage.nextElementSibling || !currentBotMessage.nextElementSibling.classList.contains('feedback-section')) {
                    addFeedbackUI(currentBotMessage, lastUserQuestion, lastAssistantAnswer);
                }
                return;
            }

            const chunk = chunkBuffer.shift();
            const currentContent = currentBotMessageContent.getAttribute('data-content') || '';
            const newContent = currentContent + chunk;
            currentBotMessageContent.setAttribute('data-content', newContent);
            currentBotMessageContent.textContent = newContent;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 20); // Display chunks every 20ms for smooth streaming effect
    }

    function setupWebSocket() {
        chatSocket = new WebSocket(wsUrl);
        chatSocket.onopen = function () {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Connected';
            statusEl.classList.remove('disconnected');
            statusEl.classList.add('connected');
            reconnectAttempts = 0;
        };
        chatSocket.onclose = function (e) {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Disconnected - attempting to reconnect...';
            statusEl.classList.remove('connected');
            statusEl.classList.add('disconnected');
            if (reconnectAttempts < maxReconnectAttempts) {
                reconnectAttempts++;
                setTimeout(setupWebSocket, reconnectInterval);
            } else {
                statusEl.textContent = 'Connection lost. Please reload the page to reconnect.';
            }
        };
        chatSocket.onerror = function (err) {
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = 'Connection error';
            statusEl.classList.remove('connected');
            statusEl.classList.add('disconnected');
        };
        chatSocket.onmessage = function (e) {
            if (e.data === "__ping__") {
                chatSocket.send("__pong__");
                return;
            }

            // Check if this is a JSON message (latency or completion signal)
            try {
                const message = JSON.parse(e.data);

                if (message.type === "latency") {
                    // Finalize the message (parse markdown, add feedback)
                    const chatContainer = document.querySelector('#chat-container');
                    const currentBotMessageContent = chatContainer.querySelector('.bot-message.current .message-content');
                    if (currentBotMessageContent) {
                        const finalContent = currentBotMessageContent.getAttribute('data-content') || '';
                        
                        // Parse markdown
                        let htmlContent = marked.parse(finalContent);
                        currentBotMessageContent.innerHTML = htmlContent;
                        
                        lastAssistantAnswer = finalContent;

                        const currentBotMessage = currentBotMessageContent.closest('.bot-message');
                        currentBotMessage.classList.remove('current');

                        if (!currentBotMessage.nextElementSibling || !currentBotMessage.nextElementSibling.classList.contains('feedback-section')) {
                            addFeedbackUI(currentBotMessage, lastUserQuestion, lastAssistantAnswer);
                        }
                    }

                    // Display latency
                    displayLatencyTimeline(message.data);
                    return;
                }

                if (message.type === "stream_complete") {
                    // Streaming finished - parse markdown and add feedback
                    const chatContainer = document.querySelector('#chat-container');
                    const currentBotMessageContent = chatContainer.querySelector('.bot-message.current .message-content');
                    if (currentBotMessageContent) {
                        const finalContent = currentBotMessageContent.getAttribute('data-content') || '';
                        
                        // Store RAG sources
                        const ragSources = message.rag_sources || [];
                        console.log(`📚 RAG sources check:`, {
                            hasRagSources: !!message.rag_sources,
                            ragSourcesLength: ragSources.length,
                            messageKeys: Object.keys(message),
                            ragSources: ragSources
                        });
                        if (ragSources.length > 0) {
                            console.log(`📚 Received ${ragSources.length} RAG sources:`, ragSources);
                        } else {
                            console.log('⚠️ No RAG sources in message');
                        }
                        
                        // Parse markdown
                        let htmlContent = marked.parse(finalContent);
                        currentBotMessageContent.innerHTML = htmlContent;
                        
                        lastAssistantAnswer = finalContent;

                        const currentBotMessage = currentBotMessageContent.closest('.bot-message');
                        currentBotMessage.classList.remove('current');
                        
                        // Add RAG Sources section if available (after bot message is finalized)
                        if (ragSources.length > 0) {
                            console.log(`📚 Adding RAG sources section with ${ragSources.length} sources`);
                            addRAGSourcesSection(currentBotMessage, ragSources);
                        }

                        if (!currentBotMessage.nextElementSibling || !currentBotMessage.nextElementSibling.classList.contains('feedback-section')) {
                            addFeedbackUI(currentBotMessage, lastUserQuestion, lastAssistantAnswer);
                        }
                    }

                    // Display timing data if available
                    if (message.timing) {
                        displayLatencyTimeline(message.timing);
                    }
                    return;
                }
            } catch (err) {
                // Not JSON, treat as regular text chunk
            }

            // Display chunk immediately
            const chatContainer = document.querySelector('#chat-container');
            let currentBotMessageContent = chatContainer.querySelector('.bot-message.current .message-content');
            if (!currentBotMessageContent) {
                currentBotMessageContent = createBotMessage();
            }

            const currentContent = currentBotMessageContent.getAttribute('data-content') || '';
            const newContent = currentContent + e.data;
            currentBotMessageContent.setAttribute('data-content', newContent);
            currentBotMessageContent.textContent = newContent;
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Track content for final markdown parsing
            lastAssistantAnswer = newContent;
        };
    }
    function createUserMessage(text) {
        const chatContainer = document.querySelector('#chat-container');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('user-message');

        const content = document.createElement('div');
        content.classList.add('message-content');
        content.textContent = text;

        messageDiv.appendChild(content);
        chatContainer.appendChild(messageDiv);

        return messageDiv;
    }

    function sendMessage() {
        if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) {
            alert("Connection lost. Please reload the page to reconnect.");
            return;
        }
        const messageInput = document.querySelector('#chat-message-input');
        const message = messageInput.value.trim();
        if (!message) return;

        console.log('About to send message:', message);

        // Remove welcome message if it exists
        const welcomeMessage = document.querySelector('.welcome-message');
        if (welcomeMessage) {
            welcomeMessage.remove();
        }

        // Clear buffer and stop any ongoing display
        chunkBuffer = [];
        if (displayInterval) {
            clearInterval(displayInterval);
            displayInterval = null;
        }
        isDisplaying = false;

        // Clear latency display
        const latencyDisplay = document.getElementById('latency-display');
        if (latencyDisplay) {
            latencyDisplay.style.display = 'none';
            latencyDisplay.textContent = '';
        }

        const currentBotMessage = document.querySelector('.bot-message.current');
        if (currentBotMessage) {
            currentBotMessage.classList.remove('current');
        }

        chatSocket.send(message);
        messageInput.value = '';
        messageInput.style.height = 'auto';

        const chatContainer = document.querySelector('#chat-container');
        createUserMessage(message);
        createSearchingBubble();
        chatContainer.scrollTop = chatContainer.scrollHeight;
        lastUserQuestion = message;
    }
    function displayLatencyTimeline(latencyData) {
        const latencyDisplay = document.getElementById('latency-display');
        if (!latencyDisplay) return;

        // Format timing values
        const fileSearchMs = latencyData.file_search_complete_ms || 0;
        const streamEndMs = latencyData.stream_end_ms || latencyData.total_ms || 0;

        // Format times for display
        const formatTime = (ms) => {
            if (ms < 1000) return `${Math.round(ms)}ms`;
            return `${(ms / 1000).toFixed(1)}s`;
        };

        // Build display text
        let displayText = '';
        if (fileSearchMs > 0) {
            displayText += `File search completes: ${formatTime(fileSearchMs)}`;
        }
        if (streamEndMs > 0) {
            if (displayText) displayText += ' • ';
            displayText += `Streaming completes: ${formatTime(streamEndMs)}`;
        }

        if (displayText) {
            latencyDisplay.textContent = displayText;
            latencyDisplay.style.display = 'block';
        } else {
            latencyDisplay.style.display = 'none';
        }
    }

    function addFeedbackUI(botMessageElem, question, answer) {
        if (botMessageElem.nextElementSibling && botMessageElem.nextElementSibling.classList.contains('feedback-section')) {
            botMessageElem.nextElementSibling.remove();
        }
        const template = document.getElementById('feedback-template');
        const feedbackElem = template.content.cloneNode(true);
        const section = feedbackElem.querySelector('.feedback-section');
        const upBtn = section.querySelector('.thumbs-up');
        const downBtn = section.querySelector('.thumbs-down');
        const thankYou = section.querySelector('.feedback-thankyou');

        upBtn.onclick = function () {
            upBtn.disabled = true;
            downBtn.disabled = true;
            fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    answer: answer,
                    thumbs_up: true,
                    comment: ''
                })
            }).then(r => r.json()).then(data => {
                thankYou.style.display = '';
                setTimeout(() => {
                    section.style.display = 'none';
                }, 2000);
            });
        };
        downBtn.onclick = function () {
            upBtn.disabled = true;
            downBtn.disabled = true;
            fetch('/api/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: question,
                    answer: answer,
                    thumbs_up: false,
                    comment: ''
                })
            }).then(r => r.json()).then(data => {
                thankYou.style.display = '';
                setTimeout(() => {
                    section.style.display = 'none';
                }, 2000);
            });
        };
        botMessageElem.parentNode.insertBefore(section, botMessageElem.nextSibling);
    }
    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    }

    document.addEventListener('DOMContentLoaded', function () {
        const inputField = document.querySelector('#chat-message-input');
        if (inputField) {
            // Auto-resize textarea
            inputField.addEventListener('input', function () {
                autoResizeTextarea(this);
            });

            inputField.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                    return false;
                }
            });
        }
        const submitButton = document.querySelector('#chat-message-submit');
        if (submitButton) {
            submitButton.onclick = sendMessage;
        }
        document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible' &&
                (!chatSocket || chatSocket.readyState !== WebSocket.OPEN)) {
                setupWebSocket();
            }
        });
        setupWebSocket();
    });

    // PDF Viewer functionality
    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let scale = 2.0; // Higher default scale for better quality
    const pdfUrl = '/static/rulebook/eASLRB_v2.12-INHERIT_ZOOM_unlocked.pdf';
    const devicePixelRatio = window.devicePixelRatio || 1;

    function makeSectionReferencesClickable(element) {
        // Pattern to match section references like A4.1, C8.1, A4.15, etc.
        // Also matches the new format with page numbers: {A4.1|48} or just A4.1
        const sectionPattern = /\b([A-Z]\d+\.\d+(?:\.\d+)?)\b/g;
        const sectionWithPagePattern = /\{([A-Z]\d+\.\d+(?:\.\d+)?)\|(\d+)\}/g;
        const walker = document.createTreeWalker(
            element,
            NodeFilter.SHOW_TEXT,
            null,
            false
        );

        const textNodes = [];
        let node;
        while (node = walker.nextNode()) {
            textNodes.push(node);
        }

        textNodes.forEach(textNode => {
            const text = textNode.textContent;

            // First, check for the new format with page numbers: {A4.1|48}
            const matchesWithPage = [...text.matchAll(sectionWithPagePattern)];
            const matches = [...text.matchAll(sectionPattern)];

            if (matchesWithPage.length > 0 || matches.length > 0) {
                const fragment = document.createDocumentFragment();
                let lastIndex = 0;
                let processedRanges = []; // Track processed ranges to avoid double-processing

                // Process matches with page numbers first (they take precedence)
                matchesWithPage.forEach(match => {
                    const start = match.index;
                    const end = start + match[0].length;
                    const section = match[1];
                    const pageNum = parseInt(match[2]);

                    // Add text before match
                    if (start > lastIndex) {
                        fragment.appendChild(document.createTextNode(text.substring(lastIndex, start)));
                    }

                    // Create clickable link for section with page number
                    const link = document.createElement('span');
                    link.className = 'section-link';
                    link.textContent = section; // Show just the section, not the full {A4.1|48}
                    link.setAttribute('data-page', pageNum);
                    link.onclick = (e) => {
                        e.preventDefault();
                        openPdfModal(section, pageNum);
                    };
                    fragment.appendChild(link);

                    lastIndex = end;
                    processedRanges.push({ start, end });
                });

                // Process regular section matches (without page numbers), but skip if already processed
                matches.forEach(match => {
                    const start = match.index;
                    const end = start + match[0].length;

                    // Check if this range overlaps with any processed range
                    const isProcessed = processedRanges.some(range =>
                        (start >= range.start && start < range.end) ||
                        (end > range.start && end <= range.end) ||
                        (start <= range.start && end >= range.end)
                    );

                    if (isProcessed) return; // Skip if already processed

                    // Add text before match
                    if (start > lastIndex) {
                        fragment.appendChild(document.createTextNode(text.substring(lastIndex, start)));
                    }

                    // Create clickable link for section (without page number - will use fallback)
                    const link = document.createElement('span');
                    link.className = 'section-link';
                    link.textContent = match[0];
                    link.onclick = (e) => {
                        e.preventDefault();
                        openPdfModal(match[0]);
                    };
                    fragment.appendChild(link);

                    lastIndex = end;
                });

                // Add remaining text
                if (lastIndex < text.length) {
                    fragment.appendChild(document.createTextNode(text.substring(lastIndex)));
                }

                textNode.parentNode.replaceChild(fragment, textNode);
            }
        });
    }

    async function openPdfModal(section, pageNum = null) {
        const modal = document.getElementById('pdf-modal');
        const loading = document.getElementById('pdf-loading');
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');

        modal.style.display = 'flex';
        loading.classList.add('show');

        try {
            // Load PDF if not already loaded
            if (!pdfDoc) {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                updatePageInfo();
            }

            // If page number is provided directly, use it (new format)
            if (pageNum) {
                currentPage = pageNum;
                await renderPage(currentPage);
            } else if (section) {
                // Fallback: search for section (old format or when page number not available)
                await navigateToSection(section);
            } else {
                // Just show first page
                await renderPage(currentPage);
            }

            loading.classList.remove('show');
            updateControls();
        } catch (error) {
            console.error('Error loading PDF:', error);
            loading.textContent = 'Error loading PDF. Please try again.';
        }
    }

    async function navigateToSection(section) {
        if (!pdfDoc) return;

        // Try PDF's internal destinations/links
        try {
            const destinations = await pdfDoc.getDestinations();

            if (destinations) {
                // Try to find destination matching the section
                let destinationName = null;

                // Try exact match first
                if (destinations[section]) {
                    destinationName = section;
                } else {
                    // Try variations (A4.1 -> A.4.1, etc.)
                    const variations = [
                        section,
                        section.replace(/([A-Z])(\d+)\.(\d+)/, '$1.$2.$3'), // A4.1 -> A.4.1
                        section.replace(/([A-Z])(\d+)\.(\d+)/, '$1 $2.$3'), // A4.1 -> A 4.1
                    ];

                    for (const variant of variations) {
                        if (destinations[variant]) {
                            destinationName = variant;
                            break;
                        }
                    }
                }

                if (destinationName) {
                    // Get the destination and navigate to it
                    const dest = await pdfDoc.getDestination(destinationName);
                    if (dest && dest[0]) {
                        const pageRef = dest[0];
                        const pageIndex = await pdfDoc.getPageIndex(pageRef);
                        currentPage = pageIndex + 1; // PDF.js uses 0-based, we use 1-based
                        await renderPage(currentPage);
                        return;
                    }
                }
            }
        } catch (error) {
            console.log('Could not use PDF destinations:', error);
        }

        // Final fallback: Search for section text in PDF
        let found = false;
        // Limit search to first 200 pages for performance
        const maxSearchPages = Math.min(200, totalPages);
        for (let pageNum = 1; pageNum <= maxSearchPages; pageNum++) {
            const page = await pdfDoc.getPage(pageNum);
            const textContent = await page.getTextContent();
            const text = textContent.items.map(item => item.str).join(' ');

            // Check if section appears in this page
            const sectionPattern = new RegExp(`\\b${section.replace('.', '\\.')}\\b`);
            if (sectionPattern.test(text)) {
                currentPage = pageNum;
                await renderPage(currentPage);
                found = true;
                break;
            }
        }

        if (!found) {
            // If not found, just show first page
            currentPage = 1;
            await renderPage(currentPage);
        }
    }

    async function renderPage(pageNum) {
        if (!pdfDoc) return;

        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: scale });

        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');

        // Use device pixel ratio for high-DPI displays (retina)
        const outputScale = devicePixelRatio;
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.style.height = Math.floor(viewport.height) + 'px';
        canvas.style.width = Math.floor(viewport.width) + 'px';

        // Scale the context to match device pixel ratio
        context.scale(outputScale, outputScale);

        const renderContext = {
            canvasContext: context,
            viewport: viewport
        };

        await page.render(renderContext).promise;
        updatePageInfo();
    }

    function updatePageInfo() {
        document.getElementById('pdf-page-info').textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('pdf-zoom-level').textContent = `${Math.round(scale * 100)}%`;
    }

    function updateControls() {
        document.getElementById('pdf-prev').disabled = currentPage <= 1;
        document.getElementById('pdf-next').disabled = currentPage >= totalPages;
    }

    function pdfPrevPage() {
        if (currentPage > 1) {
            currentPage--;
            renderPage(currentPage);
            updateControls();
        }
    }

    function pdfNextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            renderPage(currentPage);
            updateControls();
        }
    }

    function pdfZoomIn() {
        scale += 0.5;
        renderPage(currentPage);
    }

    function pdfZoomOut() {
        if (scale > 1.0) {
            scale -= 0.5;
            renderPage(currentPage);
        }
    }

    function closePdfModal() {
        document.getElementById('pdf-modal').style.display = 'none';
    }

    // Close modal on ESC key
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
            const pdfModal = document.getElementById('pdf-modal');
            if (pdfModal && pdfModal.style.display !== 'none') {
                closePdfModal();
            }
        }
    });


    // RAG Sources section
    function addRAGSourcesSection(messageElement, ragSources) {
        if (!ragSources || ragSources.length === 0) return;
        
        // Create the sources section
        const sourcesSection = document.createElement('div');
        sourcesSection.className = 'rag-sources-section';
        
        // Create collapsible header
        const header = document.createElement('div');
        header.className = 'rag-sources-header';
        header.innerHTML = `
            <span class="rag-sources-toggle">▼</span>
            <span class="rag-sources-title">Sources Used (${ragSources.length} ${ragSources.length === 1 ? 'chunk' : 'chunks'})</span>
        `;
        header.style.cursor = 'pointer';
        header.style.userSelect = 'none';
        header.style.padding = '12px';
        header.style.backgroundColor = '#f5f5f5';
        header.style.borderTop = '1px solid #ddd';
        header.style.borderRadius = '0 0 8px 8px';
        header.style.marginTop = '16px';
        header.style.fontWeight = '500';
        header.style.color = '#333';
        header.style.display = 'flex';
        header.style.alignItems = 'center';
        header.style.gap = '8px';
        
        // Create collapsible content
        const content = document.createElement('div');
        content.className = 'rag-sources-content';
        content.style.display = 'none';
        content.style.padding = '16px';
        content.style.backgroundColor = '#fafafa';
        content.style.borderTop = '1px solid #e0e0e0';
        
        // Add each source chunk
        ragSources.forEach((source, index) => {
            const sourceItem = document.createElement('div');
            sourceItem.className = 'rag-source-item';
            sourceItem.style.marginBottom = index < ragSources.length - 1 ? '16px' : '0';
            sourceItem.style.padding = '12px';
            sourceItem.style.backgroundColor = '#fff';
            sourceItem.style.border = '1px solid #e0e0e0';
            sourceItem.style.borderRadius = '4px';
            
            // Source header with index and filename
            const sourceHeader = document.createElement('div');
            sourceHeader.style.marginBottom = '8px';
            sourceHeader.style.fontSize = '0.9em';
            sourceHeader.style.fontWeight = '600';
            sourceHeader.style.color = '#666';
            sourceHeader.innerHTML = `
                <span style="color: #0066cc; font-weight: 700;">[${source.index}]</span>
                ${source.filename ? `<span style="margin-left: 8px;">${source.filename}</span>` : ''}
            `;
            
            // Source content
            const sourceContent = document.createElement('div');
            sourceContent.style.whiteSpace = 'pre-wrap';
            sourceContent.style.fontSize = '0.9em';
            sourceContent.style.lineHeight = '1.6';
            sourceContent.style.color = '#333';
            sourceContent.style.maxHeight = '200px';
            sourceContent.style.overflowY = 'auto';
            sourceContent.textContent = source.content || '(No content available)';
            
            sourceItem.appendChild(sourceHeader);
            sourceItem.appendChild(sourceContent);
            content.appendChild(sourceItem);
        });
        
        // Toggle functionality
        let isExpanded = false;
        header.addEventListener('click', () => {
            isExpanded = !isExpanded;
            content.style.display = isExpanded ? 'block' : 'none';
            const toggle = header.querySelector('.rag-sources-toggle');
            toggle.textContent = isExpanded ? '▲' : '▼';
        });
        
        sourcesSection.appendChild(header);
        sourcesSection.appendChild(content);
        
        // Insert after the bot message (messageElement is now the .bot-message container)
        if (messageElement && messageElement.parentNode) {
            messageElement.parentNode.insertBefore(sourcesSection, messageElement.nextSibling);
        } else {
            console.error('❌ Cannot insert RAG sources section: invalid messageElement');
        }
    }
</script>
{% endblock %}
