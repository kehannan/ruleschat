{% extends "base.html" %}

{% block content %}
<div id="chat-container" class="border rounded p-3 mb-3" style="height: 400px; overflow-y: scroll;">
    <!-- Chat messages will be displayed here -->
</div>

<div class="input-group mb-3">
    <input id="chat-message-input" type="text" class="form-control" placeholder="Type a message">
    <button id="chat-message-submit" class="btn btn-primary" type="button">Send</button>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const chatSocket = new WebSocket(protocol + '//' + window.location.host + '/ws/chat/');

    document.querySelector('#chat-message-submit').onclick = function() {
        const messageInput = document.querySelector('#chat-message-input');
        const message = messageInput.value.trim();
        if (!message) return;

        chatSocket.send(message);
        messageInput.value = '';

        // Display user’s message with a highlighted background
        const chatContainer = document.querySelector('#chat-container');
        const userMessageElement = document.createElement('div');
        userMessageElement.textContent = message;
        userMessageElement.classList.add('alert', 'alert-primary', 'p-2', 'mt-2'); // Bootswatch Flatly styling
        chatContainer.appendChild(userMessageElement);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    let messageBuffer = "";  // Store incoming chunks

    chatSocket.onmessage = function(e) {
        const chatContainer = document.querySelector('#chat-container');

        // Find the last bot message or create a new one
        let lastMessage = chatContainer.querySelector('.bot-message:last-of-type');
        if (!lastMessage) {
            lastMessage = document.createElement('div');
            lastMessage.classList.add('bot-message');
            chatContainer.appendChild(lastMessage);
        }

        // Collect incoming chunks into a buffer
        messageBuffer += e.data;

        // Use a small delay to check if more chunks are arriving
        if (this.chunkTimeout) clearTimeout(this.chunkTimeout);
        this.chunkTimeout = setTimeout(() => {
            lastMessage.innerHTML = marked.parse(messageBuffer);  // Apply Markdown only once
            messageBuffer = "";  // Reset buffer
        }, 100);  // Adjust delay if necessary

        chatContainer.scrollTop = chatContainer.scrollHeight;
    };
</script>
{% endblock %}
