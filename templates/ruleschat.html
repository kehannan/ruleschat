{% extends "base.html" %}

{% block content %}
<div id="chat-container" class="border rounded p-3 mb-3" style="height: 400px; overflow-y: scroll;">
    <!-- Chat messages will be displayed here -->
</div>

<div class="input-group mb-3">
    <input id="chat-message-input" type="text" class="form-control" placeholder="Type a message">
    <button id="chat-message-submit" class="btn btn-primary" type="button">Send</button>
</div>
<div id="connection-status" class="text-muted small">Connected</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    // Define variables and functions first
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + window.location.host + '/ws/chat/';
    let chatSocket = null;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    const reconnectInterval = 3000; // 3 seconds between reconnect attempts
    
    function setupWebSocket() {
        chatSocket = new WebSocket(wsUrl);
        
        chatSocket.onopen = function() {
            console.log('WebSocket connection established');
            document.getElementById('connection-status').textContent = 'Connected';
            document.getElementById('connection-status').classList.remove('text-danger');
            document.getElementById('connection-status').classList.add('text-success');
            reconnectAttempts = 0; // Reset reconnect attempts on successful connection
        };

        chatSocket.onclose = function(e) {
            console.log('WebSocket connection closed', e);
            document.getElementById('connection-status').textContent = 'Disconnected - attempting to reconnect...';
            document.getElementById('connection-status').classList.remove('text-success');
            document.getElementById('connection-status').classList.add('text-danger');
            
            // Try to reconnect
            if (reconnectAttempts < maxReconnectAttempts) {
                reconnectAttempts++;
                setTimeout(setupWebSocket, reconnectInterval);
            } else {
                document.getElementById('connection-status').textContent = 
                    'Connection lost. Please reload the page to reconnect.';
            }
        };

        chatSocket.onerror = function(err) {
            console.error('WebSocket error:', err);
            document.getElementById('connection-status').textContent = 'Connection error';
            document.getElementById('connection-status').classList.remove('text-success');
            document.getElementById('connection-status').classList.add('text-danger');
        };

        chatSocket.onmessage = function(e) {
            // Handle ping message
            if (e.data === "__ping__") {
                chatSocket.send("__pong__");
                console.log("Ping received, sent pong");
                return;
            }
            
            const chatContainer = document.querySelector('#chat-container');

            // Find or create the current bot message container
            let currentBotMessage = chatContainer.querySelector('.bot-message.current');
            if (!currentBotMessage) {
                currentBotMessage = document.createElement('div');
                currentBotMessage.classList.add('bot-message', 'current', 'alert', 'alert-secondary', 'p-2', 'mt-2');
                chatContainer.appendChild(currentBotMessage);
            }

            // Append the new chunk and render with Markdown
            const currentContent = currentBotMessage.getAttribute('data-content') || '';
            const newContent = currentContent + e.data;
            currentBotMessage.setAttribute('data-content', newContent);
            currentBotMessage.innerHTML = marked.parse(newContent);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };
    }
    
    function sendMessage() {
        if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) {
            alert("Connection lost. Please reload the page to reconnect.");
            return;
        }
        
        const messageInput = document.querySelector('#chat-message-input');
        const message = messageInput.value.trim();
        if (!message) return;

        // Remove the 'current' class from any existing bot message
        const currentBotMessage = document.querySelector('.bot-message.current');
        if (currentBotMessage) {
            currentBotMessage.classList.remove('current');
        }

        chatSocket.send(message);
        messageInput.value = '';

        // Display user's message
        const chatContainer = document.querySelector('#chat-container');
        const userMessageElement = document.createElement('div');
        userMessageElement.textContent = message;
        userMessageElement.classList.add('alert', 'alert-primary', 'p-2', 'mt-2');
        chatContainer.appendChild(userMessageElement);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    // Initialize everything when the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM fully loaded, setting up application');
        
        // Set up Enter key handler
        const inputField = document.querySelector('#chat-message-input');
        if (inputField) {
            console.log('Input field found, attaching keydown listener');
            inputField.addEventListener('keydown', function(e) {
                console.log('Keydown event detected:', e.key);
                if (e.key === 'Enter') {
                    console.log('Enter key pressed, submitting message');
                    e.preventDefault(); // Prevent default Enter key behavior
                    sendMessage();
                    return false; // Additional prevention of default behavior
                }
            });
        } else {
            console.error('Chat input field not found');
        }
        
        // Set up submit button handler
        const submitButton = document.querySelector('#chat-message-submit');
        if (submitButton) {
            console.log('Submit button found, attaching click listener');
            submitButton.onclick = sendMessage;
        } else {
            console.error('Submit button not found');
        }
        
        // Auto-reconnect if tab regains focus after being inactive
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible' && 
                (!chatSocket || chatSocket.readyState !== WebSocket.OPEN)) {
                console.log('Tab is visible again, attempting to reconnect');
                setupWebSocket();
            }
        });
        
        // Initial WebSocket setup
        setupWebSocket();
        
        console.log('Application setup complete');
    });
</script>
{% endblock %}
