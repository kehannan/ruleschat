{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card mt-4">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">User Profile</h3>
            </div>
            <div class="card-body">
                <!-- Profile Information -->
                <div class="mb-4">
                    <h4>Profile Information</h4>
                    {% if message %}
                        <div class="alert alert-{{ message_type }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endif %}
                    <form method="post" action="{{ url_for('update_profile') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" value="{{ user.username }}" readonly>
                            <small class="form-text text-muted">Username cannot be changed</small>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email or '' }}">
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>

                <!-- API Key Section -->
                <div class="mb-4">
                    <h4>API Key</h4>
                    <div class="mb-3">
                        <label for="api_key" class="form-label">Your API Key</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="api_key" value="{{ user.api_key or 'No API key generated yet' }}" readonly>
                            <button class="btn btn-outline-secondary" type="button" id="copyButton" onclick="copyApiKey()" {% if not user.api_key %}disabled{% endif %}>
                                <i class="bi bi-clipboard"></i> Copy
                            </button>
                        </div>
                        <small class="form-text text-muted">Use this API key to authenticate with MCP services</small>
                    </div>
                    <form method="post" action="{{ url_for('generate_api_key') }}">
                        <button type="submit" class="btn btn-success">Generate New API Key</button>
                        <small class="form-text text-muted d-block mt-2">Warning: This will invalidate any existing API key</small>
                    </form>
                </div>

                <!-- Change Password -->
                <div>
                    <h4>Change Password</h4>
                    <form method="post" action="{{ url_for('change_password') }}">
                        <div class="mb-3">
                            <label for="current_password" class="form-label">Current Password</label>
                            <input type="password" class="form-control" id="current_password" name="current_password" required>
                        </div>
                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required>
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                        <button type="submit" class="btn btn-warning">Change Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function copyApiKey() {
    var apiKeyInput = document.getElementById("api_key");
    apiKeyInput.select();
    apiKeyInput.setSelectionRange(0, 99999); /* For mobile devices */
    document.execCommand("copy");
    
    // Show feedback to user
    var copyButton = document.getElementById("copyButton");
    var originalText = copyButton.innerHTML;
    copyButton.innerHTML = '<i class="bi bi-check"></i> Copied!';
    setTimeout(function() {
        copyButton.innerHTML = originalText;
    }, 2000);
}
</script>
{% endblock %}
