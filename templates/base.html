<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Rules Chat for Advanced Squad Leader (ASL){% endblock %}</title>
    <!-- Bootswatch (Flatly) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/flatly/bootstrap.min.css"
    />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
      /* Minimal, professional styling with smaller fonts */
      body {
        font-size: 14px;
        line-height: 1.6;
        color: #333;
      }
      h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 1rem; }
      h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.875rem; }
      h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }
      h4 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.625rem; }
      h5 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
      h6 { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
      .lead { font-size: 1rem; font-weight: 400; }
      p { font-size: 14px; margin-bottom: 0.875rem; }
      .navbar { padding: 0.5rem 0; font-size: 14px; }
      .navbar-brand { font-size: 1rem; font-weight: 500; }
      .nav-link { font-size: 14px; padding: 0.375rem 0.75rem; }
      .container { max-width: 960px; }
      .card { border: 1px solid #e0e0e0; box-shadow: none; }
      .card-header { font-size: 0.875rem; font-weight: 600; padding: 0.75rem 1rem; background-color: #f8f9fa; border-bottom: 1px solid #e0e0e0; }
      .card-body { padding: 1rem; }
      .btn { font-size: 14px; padding: 0.375rem 0.75rem; }
      .form-label { font-size: 13px; font-weight: 500; margin-bottom: 0.375rem; }
      .form-control { font-size: 14px; padding: 0.375rem 0.75rem; }
      .text-muted { font-size: 12px; }
      .small { font-size: 12px; }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% block navbar %}
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">Rules Chat</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
            <li class="nav-item nav-chat" data-require-login="true"><a class="nav-link" href="{{ url_for('ruleschat') }}">Chat</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('evals') }}">Evals</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
            <li class="nav-item nav-profile" data-require-login="true"><a class="nav-link" href="{{ url_for('profile_page') }}">Profile</a></li>
            <li class="nav-item nav-admin" data-require-admin="true"><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Admin</a></li>
            <li class="nav-item nav-logout" data-require-login="true"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
            <li class="nav-item nav-login" data-require-logout="true"><a class="nav-link" href="{{ url_for('login') }}">Login</a></li>
          </ul>
          <script>
            (function() {
              const isLoggedIn = {% if user_email is defined and user_email %}true{% else %}false{% endif %};
              const isAdmin = {% if admin_email is defined and user_email == admin_email %}true{% else %}false{% endif %};
              
              document.querySelectorAll('[data-require-login="true"]').forEach(el => {
                if (!isLoggedIn) el.style.display = 'none';
              });
              document.querySelectorAll('[data-require-admin="true"]').forEach(el => {
                if (!isAdmin) el.style.display = 'none';
              });
              document.querySelectorAll('[data-require-logout="true"]').forEach(el => {
                if (isLoggedIn) el.style.display = 'none';
              });
            })();
          </script>
        </div>
      </div>
    </nav>
    {% endblock %}

    <div class="container mt-4 mb-5" id="main-container">
      {% block content %}
      {% endblock %}
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
