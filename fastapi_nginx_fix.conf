# HTTP server block: handles ACME challenges and redirects all other traffic to HTTPS
server {
    listen 80;
    server_name kevmo.us www.kevmo.us;

    # Serve ACME challenge requests from a dedicated directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block: reverse proxies to your FastAPI app
server {
    listen 443 ssl;
    server_name kevmo.us www.kevmo.us;

    ssl_certificate /etc/letsencrypt/live/kevmo.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kevmo.us/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;  # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;    # managed by Certbot

    # WebSocket connections
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Main FastAPI API endpoints  
    location /api/ {
       proxy_pass http://127.0.0.1:8000/api/;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";
       proxy_set_header Host $host;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main website
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
} 